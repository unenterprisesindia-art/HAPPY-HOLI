<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi - Festival of Colors</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --holi-pink: #FF1493;
            --holi-yellow: #FFD700;
            --holi-green: #00FF7F;
            --holi-orange: #FF6B35;
            --holi-purple: #9B59B6;
            --holi-blue: #00CED1;
            --holi-magenta: #FF00FF;
            --holi-red: #FF4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .display-font {
            font-family: 'Pacifico', cursive;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        #splash-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .main-container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .input-section {
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        .title {
            font-size: clamp(3rem, 10vw, 6rem);
            background: linear-gradient(45deg, var(--holi-pink), var(--holi-yellow), var(--holi-green), var(--holi-orange), var(--holi-purple), var(--holi-blue));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-bottom: 2rem;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .name-input {
            padding: 1rem 2rem;
            font-size: 1.25rem;
            border: 3px solid transparent;
            border-radius: 50px;
            background: linear-gradient(#1a1a2e, #1a1a2e) padding-box,
                        linear-gradient(45deg, var(--holi-pink), var(--holi-yellow), var(--holi-green), var(--holi-blue)) border-box;
            color: white;
            text-align: center;
            outline: none;
            width: min(400px, 90vw);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .name-input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.4);
        }

        .celebrate-btn {
            padding: 1rem 3rem;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--holi-pink), var(--holi-orange));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .celebrate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .celebrate-btn:hover::before {
            left: 100%;
        }

        .celebrate-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 40px rgba(255, 20, 147, 0.5);
        }

        .celebrate-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Greeting Section */
        .greeting-section {
            display: none;
            text-align: center;
            animation: explodeIn 1s ease-out;
        }

        .greeting-section.active {
            display: block;
        }

        .greeting-text {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 1rem;
        }

        .greeting-text .happy {
            display: inline-block;
            background: linear-gradient(45deg, var(--holi-yellow), var(--holi-orange), var(--holi-red));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 2s ease infinite;
        }

        .greeting-text .holi {
            display: inline-block;
            background: linear-gradient(45deg, var(--holi-green), var(--holi-blue), var(--holi-purple));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 2s ease infinite reverse;
        }

        .person-name {
            font-size: clamp(3rem, 12vw, 7rem);
            margin: 1rem 0;
            position: relative;
            display: inline-block;
        }

        .person-name span {
            display: inline-block;
            animation: letterBounce 0.6s ease-out forwards;
            opacity: 0;
        }

        .wish-message {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(1rem, 3vw, 1.5rem);
            max-width: 600px;
            margin: 2rem auto;
            line-height: 1.8;
        }

        .back-btn {
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Color splashes on greeting */
        .color-splash {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: splashExpand 1s ease-out forwards;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes explodeIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes letterBounce {
            0% {
                opacity: 0;
                transform: translateY(-100px) rotate(-10deg);
            }
            60% {
                transform: translateY(20px) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        @keyframes splashExpand {
            0% {
                transform: scale(0);
                opacity: 0.8;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Decorative elements */
        .deco-powder {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .deco-1 { top: 10%; left: 10%; background: var(--holi-pink); animation-delay: 0s; }
        .deco-2 { top: 60%; right: 10%; background: var(--holi-yellow); animation-delay: 1s; }
        .deco-3 { bottom: 10%; left: 30%; background: var(--holi-green); animation-delay: 2s; }
        .deco-4 { top: 30%; right: 20%; background: var(--holi-blue); animation-delay: 3s; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="deco-powder deco-1"></div>
    <div class="deco-powder deco-2"></div>
    <div class="deco-powder deco-3"></div>
    <div class="deco-powder deco-4"></div>

    <canvas id="particle-canvas"></canvas>
    <canvas id="splash-canvas"></canvas>

    <div class="main-container">
        <!-- Input Section -->
        <section class="input-section" id="input-section">
            <h1 class="title display-font">Happy Holi</h1>
            <p class="subtitle">Enter your name to receive colorful wishes</p>
            <div class="input-wrapper">
                <input type="text" class="name-input" id="name-input" placeholder="Your Name" maxlength="20" autocomplete="off">
                <button class="celebrate-btn" id="celebrate-btn">Celebrate with Colors</button>
            </div>
        </section>

        <!-- Greeting Section -->
        <section class="greeting-section" id="greeting-section">
            <div class="greeting-text display-font">
                <span class="happy">Happy</span> <span class="holi">Holi</span>
            </div>
            <h2 class="person-name display-font" id="person-name"></h2>
            <p class="wish-message">
                May your life be filled with vibrant colors of joy, prosperity, and love. 
                Let this festival of colors paint your world with endless happiness!
            </p>
            <button class="back-btn" id="back-btn">Wish Someone Else</button>
        </section>
    </div>

    <script>
        // Color palette
        const holiColors = [
            '#FF1493', // pink
            '#FFD700', // yellow
            '#00FF7F', // green
            '#FF6B35', // orange
            '#9B59B6', // purple
            '#00CED1', // blue
            '#FF00FF', // magenta
            '#FF4757', // red
            '#7FFF00', // chartreuse
            '#FF69B4', // hot pink
        ];

        // Particle System
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        const splashCanvas = document.getElementById('splash-canvas');
        const sCtx = splashCanvas.getContext('2d');

        let particles = [];
        let splashes = [];
        let mouseX = 0;
        let mouseY = 0;
        let isGreetingActive = false;

        function resizeCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            splashCanvas.width = window.innerWidth;
            splashCanvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, burst = false) {
                this.x = x !== undefined ? x : Math.random() * particleCanvas.width;
                this.y = y !== undefined ? y : Math.random() * particleCanvas.height;
                this.size = Math.random() * 8 + 2;
                this.color = holiColors[Math.floor(Math.random() * holiColors.length)];
                this.speedX = (Math.random() - 0.5) * (burst ? 8 : 2);
                this.speedY = (Math.random() - 0.5) * (burst ? 8 : 2) - (burst ? 2 : 0.5);
                this.gravity = burst ? 0.1 : 0.02;
                this.life = burst ? 1 : Math.random();
                this.decay = burst ? 0.015 : 0.001;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.shape = Math.floor(Math.random() * 3); // 0: circle, 1: square, 2: triangle
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.rotation += this.rotationSpeed;
                this.life -= this.decay;

                // Boundary check for non-burst particles
                if (this.life <= 0) {
                    if (!isGreetingActive) {
                        this.reset();
                    }
                }
            }

            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = -10;
                this.life = Math.random();
                this.speedY = Math.random() * 2 + 0.5;
                this.color = holiColors[Math.floor(Math.random() * holiColors.length)];
            }

            draw() {
                pCtx.save();
                pCtx.translate(this.x, this.y);
                pCtx.rotate(this.rotation);
                pCtx.globalAlpha = Math.max(0, this.life);
                pCtx.fillStyle = this.color;

                const safeSize = Math.max(0.1, this.size);

                if (this.shape === 0) {
                    pCtx.beginPath();
                    pCtx.arc(0, 0, safeSize, 0, Math.PI * 2);
                    pCtx.fill();
                } else if (this.shape === 1) {
                    pCtx.fillRect(-safeSize, -safeSize, safeSize * 2, safeSize * 2);
                } else {
                    pCtx.beginPath();
                    pCtx.moveTo(0, -safeSize);
                    pCtx.lineTo(safeSize, safeSize);
                    pCtx.lineTo(-safeSize, safeSize);
                    pCtx.closePath();
                    pCtx.fill();
                }

                pCtx.restore();
            }
        }

        class Splash {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.maxRadius = 150 + Math.random() * 100;
                this.color = holiColors[Math.floor(Math.random() * holiColors.length)];
                this.opacity = 0.6;
            }

            update() {
                this.radius += (this.maxRadius - this.radius) * 0.1;
                this.opacity *= 0.95;
            }

            draw() {
                if (this.opacity < 0.01) return;
                
                const safeRadius = Math.max(0.1, this.radius);
                
                const gradient = sCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, safeRadius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');

                sCtx.globalAlpha = this.opacity;
                sCtx.fillStyle = gradient;
                sCtx.beginPath();
                sCtx.arc(this.x, this.y, safeRadius, 0, Math.PI * 2);
                sCtx.fill();
                sCtx.globalAlpha = 1;
            }

            isDead() {
                return this.opacity < 0.01;
            }
        }

        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        // Burst effect
        function createBurst(x, y, count = 50) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, true));
            }
        }

        // Create splash
        function createSplash(x, y) {
            splashes.push(new Splash(x, y));
        }

        // Animation loop
        function animate() {
            // Clear canvases
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            sCtx.clearRect(0, 0, splashCanvas.width, splashCanvas.height);

            // Update and draw particles
            particles = particles.filter(p => p.life > 0 || !isGreetingActive);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update and draw splashes
            splashes = splashes.filter(s => !s.isDead());
            splashes.forEach(s => {
                s.update();
                s.draw();
            });

            // Add new particles in input mode
            if (!isGreetingActive && particles.length < 100 && Math.random() < 0.3) {
                particles.push(new Particle());
            }

            requestAnimationFrame(animate);
        }

        // Mouse events
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Create trail particles occasionally
            if (Math.random() < 0.2) {
                particles.push(new Particle(mouseX, mouseY, false));
            }
        });

        document.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY, 30);
            createSplash(e.clientX, e.clientY);
        });

        // Touch events for mobile
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            if (Math.random() < 0.3) {
                particles.push(new Particle(mouseX, mouseY, false));
            }
        });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            createBurst(touch.clientX, touch.clientY, 30);
            createSplash(touch.clientX, touch.clientY);
        });

        // DOM Elements
        const inputSection = document.getElementById('input-section');
        const greetingSection = document.getElementById('greeting-section');
        const nameInput = document.getElementById('name-input');
        const celebrateBtn = document.getElementById('celebrate-btn');
        const backBtn = document.getElementById('back-btn');
        const personName = document.getElementById('person-name');

        // Animate name letters
        function animateName(name) {
            personName.innerHTML = '';
            const letters = name.split('');
            
            letters.forEach((letter, index) => {
                const span = document.createElement('span');
                span.textContent = letter === ' ' ? '\u00A0' : letter;
                span.style.animationDelay = `${index * 0.1}s`;
                
                // Assign vibrant colors to each letter
                const colorIndex = index % holiColors.length;
                span.style.color = holiColors[colorIndex];
                span.style.textShadow = `0 0 20px ${holiColors[colorIndex]}, 0 0 40px ${holiColors[colorIndex]}`;
                
                personName.appendChild(span);
            });
        }

        // Create celebration burst
        function celebrationBurst() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Multiple bursts from different positions
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * window.innerWidth * 0.6;
                    const offsetY = (Math.random() - 0.5) * window.innerHeight * 0.4;
                    createBurst(centerX + offsetX, centerY + offsetY, 80);
                    createSplash(centerX + offsetX, centerY + offsetY);
                }, i * 200);
            }

            // Continuous small bursts
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createBurst(x, y, 30);
                }, i * 100);
            }
        }

        // Show greeting
        function showGreeting(name) {
            isGreetingActive = true;
            inputSection.style.display = 'none';
            greetingSection.classList.add('active');
            
            animateName(name);
            celebrationBurst();

            // Keep creating celebration particles
            const celebrationInterval = setInterval(() => {
                if (!isGreetingActive) {
                    clearInterval(celebrationInterval);
                    return;
                }
                const x = Math.random() * window.innerWidth;
                const y = window.innerHeight + 50;
                const p = new Particle(x, y, false);
                p.speedY = -Math.random() * 3 - 2;
                p.decay = 0.003;
                particles.push(p);
            }, 50);
        }

        // Show input
        function showInput() {
            isGreetingActive = false;
            greetingSection.classList.remove('active');
            inputSection.style.display = 'block';
            nameInput.value = '';
            initParticles();
        }

        // Event listeners
        celebrateBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (name) {
                showGreeting(name);
            } else {
                // Shake animation for empty input
                nameInput.style.animation = 'none';
                nameInput.offsetHeight; // Trigger reflow
                nameInput.style.animation = 'shake 0.5s ease';
                
                // Add shake keyframes dynamically
                if (!document.getElementById('shake-style')) {
                    const style = document.createElement('style');
                    style.id = 'shake-style';
                    style.textContent = `
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            20%, 60% { transform: translateX(-10px); }
                            40%, 80% { transform: translateX(10px); }
                        }
                    `;
                    document.head.appendChild(style);
                }
            }
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                celebrateBtn.click();
            }
        });

        backBtn.addEventListener('click', showInput);

        // Initialize
        initParticles();
        animate();

        // Keyboard accessibility
        celebrateBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                celebrateBtn.click();
            }
        });

        backBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                backBtn.click();
            }
        });
    </script>
</body>
</html>
